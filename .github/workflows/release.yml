name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Run unit tests
        run: zig build test --summary all

      - name: Check formatting
        run: zig fmt --check .

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build release binaries (linux/amd64)
        run: |
          zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux-gnu -Dcpu=baseline
          mkdir -p release-assets
          cp zig-out/bin/server release-assets/zquic-server-linux-amd64
          cp zig-out/bin/client release-assets/zquic-client-linux-amd64
          chmod +x release-assets/*

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract the section for this tag from CHANGELOG.md (between the tag header and the next ## header).
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a file to handle multi-line content safely.
          echo "$NOTES" > release-notes.md
          echo "Generated release notes for $TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Idempotent release creation: if the release already exists
          # (e.g. a previous run created it but a later step flaked), we
          # update notes and re-upload assets rather than failing.
          PRERELEASE_FLAG=""
          case "${TAG}" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — updating notes and re-uploading assets."
            gh release edit "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --notes-file release-notes.md \
              ${PRERELEASE_FLAG:+--prerelease}
            gh release upload "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber \
              release-assets/zquic-server-linux-amd64 \
              release-assets/zquic-client-linux-amd64
          else
            echo "Creating new release ${TAG}."
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${TAG}" \
              --notes-file release-notes.md \
              ${PRERELEASE_FLAG} \
              release-assets/zquic-server-linux-amd64 \
              release-assets/zquic-client-linux-amd64
          fi
