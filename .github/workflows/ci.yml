name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build library and binaries
        run: zig build

      - name: Build examples
        run: zig build examples

      - name: Run unit tests
        run: zig build test --summary all

  bench-e2e:
    name: End-to-End Throughput Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install OpenSSL (for cert generation)
        run: sudo apt-get install -y openssl

      - name: Run end-to-end benchmark (5 MB transfer)
        # Use --size-mb 5 to keep CI fast (~5s on loopback).
        # The benchmark exits non-zero if the transfer is incomplete,
        # so this step fails on any CC / loss-detection regression.
        run: zig build bench-e2e -Doptimize=ReleaseFast -- --size-mb 5

  lint:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Check formatting
        run: zig fmt --check .

  interop-image:
    name: Build Interop Image
    runs-on: ubuntu-latest
    # Build the image on every branch push and on PRs so problems are caught
    # before they reach master. The interop-run job below then uses it.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build release binaries
        # Pin to x86_64 baseline so the binary runs on any x86_64 runner.
        # Without -Dcpu=baseline, ReleaseFast targets the build runner's native
        # CPU (may include AVX-512); the resulting binary then crashes with
        # SIGILL on a different-model runner in the interop job.
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux-gnu -Dcpu=baseline

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Dockerfile.prebuilt simply COPYs zig-out/bin/* — no Zig toolchain
      # download happens inside Docker.
      - name: Build and export interop image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: interop/Dockerfile.prebuilt
          # Export to the local daemon so the interop-run job can load it.
          load: true
          push: false
          tags: zquic:interop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save the image as a tar so the interop-run job can load it without
      # rebuilding (the two jobs run on separate runners).
      - name: Save image tar
        run: docker save zquic:interop | gzip > zquic-interop.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: zquic-interop-image
          path: zquic-interop.tar.gz
          retention-days: 1

  # ── Interop Runner ──────────────────────────────────────────────────────────
  # Runs on every push and every PR so regressions are caught before merge.
  # Marked continue-on-error while the implementation is still WIP; results
  # are always uploaded as an artefact for inspection.
  interop-run:
    name: Interop Runner Tests
    runs-on: ubuntu-latest
    needs: [test, interop-image]
    # Run on all branch pushes and pull requests (not just master).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Download the image tar; the actual load happens after Docker is upgraded
      # and the daemon is restarted with IPv6 enabled (see steps below).
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: zquic-interop-image

      # Checkout the official quic-interop-runner.
      - name: Checkout quic-interop-runner
        uses: actions/checkout@v4
        with:
          repository: quic-interop/quic-interop-runner
          path: quic-interop-runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install interop runner dependencies
        run: pip3 install -r quic-interop-runner/requirements.txt

      # Register zquic in implementations_quic.json alongside the existing
      # implementations.  We use role "both" (can act as client and server).
      - name: Register zquic implementation
        run: |
          python3 - <<'EOF'
          import json, pathlib

          path = pathlib.Path("quic-interop-runner/implementations_quic.json")
          impls = json.loads(path.read_text())
          impls["zquic"] = {
              "image": "zquic:interop",
              "url": "https://github.com/ch4r10t33r/zquic",
              "role": "both",
          }
          path.write_text(json.dumps(impls, indent=2))
          print("Registered zquic:", impls["zquic"])
          EOF

      # The quic-interop-runner network simulator requires Docker Engine ≥ 28.1
      # (for the interface_name feature).  ubuntu-latest ships with an older
      # version, so we upgrade from the official Docker apt repository first.
      - name: Upgrade Docker Engine to v28.1+
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
            -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
            https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            docker-ce docker-ce-cli containerd.io \
            docker-buildx-plugin docker-compose-plugin
          docker --version

      # Install TShark (required by quic-interop-runner to verify pcap traces).
      # Without TShark every test is marked FAILED regardless of actual outcome.
      # DEBIAN_FRONTEND=noninteractive suppresses the interactive "should
      # non-superusers be able to capture packets?" prompt during install.
      - name: Install TShark
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq tshark
          tshark --version | head -1

      # Enable IPv6 in Docker (required by the interop network simulator).
      - name: Enable IPv6 for Docker
        run: |
          sudo modprobe ip6table_filter || true
          echo '{"ipv6": true, "fixed-cidr-v6": "2001:db8:1::/64"}' | \
            sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          # Reload the zquic image after Docker restart (daemon was restarted)
          docker load < zquic-interop.tar.gz

      # Run the test suite against zquic acting as both client and server.
      # Order rationale: fast-passing tests run first to fail early on
      # regressions.  Tests that time out at 60 s (zerortt, connectionmigration,
      # multiplexing) are pushed to the end because a 60 s timeout corrupts the
      # NS3 ARP cache for subsequent tests.
      # http3 must run BEFORE zerortt/connectionmigration: zerortt now actually
      # connects to the server (resolveAddress IPv4 fix) and times out at 60 s,
      # which would contaminate NS3 ARP state and cause http3 to fail.
      # rebind-port uses the "rebind" NS3 scenario which periodically changes the
      # client's source port (simulating NAT rebinding).  The server detects the
      # new src addr and sends PATH_CHALLENGE; the client responds PATH_RESPONSE.
      - name: Run interop test suite
        run: |
          mkdir -p interop-results
          cd quic-interop-runner
          python3 run.py \
            --client zquic \
            --server zquic \
            --test handshake,transfer,retry,chacha20,keyupdate,v2,ecn,resumption,http3,zerortt,connectionmigration,multiplexing,rebind-port \
            --log-dir ../interop-results/logs \
            --json ../interop-results/results.json \
            --debug
        # run.py exits with nr_failed (0 = all passed). Do NOT use continue-on-error
        # here — test failures must fail the job. The upload/summary steps below use
        # if: always() so they still run even when this step fails.

      # Always upload results so we can track progress across commits.
      - name: Upload interop results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-results-${{ github.sha }}
          path: interop-results/
          retention-days: 30

      # Print a compact pass/fail summary to the job log.
      - name: Print result summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys

          p = pathlib.Path("interop-results/results.json")
          if not p.exists():
              print("No results.json found — test run may have failed to start.")
              sys.exit(0)

          data = json.loads(p.read_text())

          # quic-interop-runner JSON layout:
          #   clients:  [str, ...]
          #   servers:  [str, ...]
          #   results:  flat list, one entry per (client, server) pair (iterating clients outer, servers inner)
          #             each entry is a list of per-test dicts: [{abbr, name, result}, ...]
          #             result values: "succeeded" | "failed" | "unsupported" | None
          clients = data.get("clients", [])
          servers = data.get("servers", [])
          raw = data.get("results", [])

          passed, failed, unsupported = [], [], []
          pair_idx = 0
          for client in clients:
              for server in servers:
                  if pair_idx >= len(raw):
                      break
                  pair_results = raw[pair_idx]
                  pair_idx += 1
                  label = f"{client}→{server}"
                  for test_result in pair_results:
                      if not isinstance(test_result, dict):
                          continue
                      test_name = test_result.get("name") or test_result.get("abbr", "?")
                      result = test_result.get("result")
                      tag = f"{test_name}({label})"
                      if result == "succeeded":
                          passed.append(tag)
                      elif result in (None, "unsupported", "skipped"):
                          unsupported.append(tag)
                      else:
                          failed.append(tag)

          print(f"\n{'='*55}")
          print(f"INTEROP RESULTS")
          print(f"{'='*55}")
          print(f"  PASSED      : {len(passed):2d}  {passed}")
          print(f"  FAILED      : {len(failed):2d}  {failed}")
          print(f"  UNSUPPORTED : {len(unsupported):2d}  {unsupported}")
          print(f"{'='*55}\n")
          EOF
