name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build library and binaries
        run: zig build

      - name: Build examples
        run: zig build examples

      - name: Run unit tests
        run: zig build test --summary all

  bench-e2e:
    name: End-to-End Throughput Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install OpenSSL (for cert generation)
        run: sudo apt-get install -y openssl

      - name: Run end-to-end benchmark (5 MB transfer)
        # Use --size-mb 5 to keep CI fast (~5s on loopback).
        # The benchmark exits non-zero if the transfer is incomplete,
        # so this step fails on any CC / loss-detection regression.
        run: zig build bench-e2e -Doptimize=ReleaseFast -- --size-mb 5

  lint:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Check formatting
        run: zig fmt --check .

  interop-image:
    name: Build Interop Image
    runs-on: ubuntu-latest
    # Build the image on every branch push and on PRs so problems are caught
    # before they reach master. The interop-run job below then uses it.
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build release binaries
        # Pin to x86_64 baseline so the binary runs on any x86_64 runner.
        # Without -Dcpu=baseline, ReleaseFast targets the build runner's native
        # CPU (may include AVX-512); the resulting binary then crashes with
        # SIGILL on a different-model runner in the interop job.
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-linux-gnu -Dcpu=baseline

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Dockerfile.prebuilt simply COPYs zig-out/bin/* — no Zig toolchain
      # download happens inside Docker.
      - name: Build and export interop image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: interop/Dockerfile.prebuilt
          # Export to the local daemon so the interop-run job can load it.
          load: true
          push: false
          tags: zquic:interop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Save the image as a tar so the interop-run job can load it without
      # rebuilding (the two jobs run on separate runners).
      - name: Save image tar
        run: docker save zquic:interop | gzip > zquic-interop.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: zquic-interop-image
          path: zquic-interop.tar.gz
          retention-days: 1

  # ── Interop Runner ──────────────────────────────────────────────────────────
  # Runs on every push and every PR so regressions are caught before merge.
  # Marked continue-on-error while the implementation is still WIP; results
  # are always uploaded as an artefact for inspection.
  interop-run:
    name: Interop Runner Tests
    runs-on: ubuntu-latest
    needs: [test, interop-image]
    # Run on all branch pushes and pull requests (not just master).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Download the image tar; the actual load happens after Docker is upgraded
      # and the daemon is restarted with IPv6 enabled (see steps below).
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: zquic-interop-image

      # Checkout the official quic-interop-runner.
      - name: Checkout quic-interop-runner
        uses: actions/checkout@v4
        with:
          repository: quic-interop/quic-interop-runner
          path: quic-interop-runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install interop runner dependencies
        run: pip3 install -r quic-interop-runner/requirements.txt

      # Register zquic in implementations_quic.json alongside the existing
      # implementations.  We use role "both" (can act as client and server).
      - name: Register zquic implementation
        run: |
          python3 - <<'EOF'
          import json, pathlib

          path = pathlib.Path("quic-interop-runner/implementations_quic.json")
          impls = json.loads(path.read_text())
          impls["zquic"] = {
              "image": "zquic:interop",
              "url": "https://github.com/ch4r10t33r/zquic",
              "role": "both",
          }
          path.write_text(json.dumps(impls, indent=2))
          print("Registered zquic:", impls["zquic"])
          EOF

      # The quic-interop-runner network simulator requires Docker Engine ≥ 28.1
      # (for the interface_name feature).  ubuntu-latest ships with an older
      # version, so we upgrade from the official Docker apt repository first.
      - name: Upgrade Docker Engine to v28.1+
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
            -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
            https://download.docker.com/linux/ubuntu \
            $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
            sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            docker-ce docker-ce-cli containerd.io \
            docker-buildx-plugin docker-compose-plugin
          docker --version

      # Install TShark (required by quic-interop-runner to verify pcap traces).
      # Without TShark every test is marked FAILED regardless of actual outcome.
      # DEBIAN_FRONTEND=noninteractive suppresses the interactive "should
      # non-superusers be able to capture packets?" prompt during install.
      - name: Install TShark
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq tshark
          tshark --version | head -1

      # Enable IPv6 in Docker (required by the interop network simulator).
      - name: Enable IPv6 for Docker
        run: |
          sudo modprobe ip6table_filter || true
          echo '{"ipv6": true, "fixed-cidr-v6": "2001:db8:1::/64"}' | \
            sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          # Reload the zquic image after Docker restart (daemon was restarted)
          docker load < zquic-interop.tar.gz

      # Bump default interop timeout to 180 s; multiplexing gets 480 s (see below).
      - name: Bump interop test timeouts
        run: |
          python3 - <<'EOF'
          import pathlib

          base = pathlib.Path("quic-interop-runner/testcase.py")
          src = base.read_text()
          old = '    def timeout() -> int:\n        """timeout in s"""\n        return 60\n'
          new = '    def timeout() -> int:\n        """timeout in s"""\n        return 180\n'
          if old not in src:
              raise SystemExit("Did not find expected default timeout block in testcase.py")
          base.write_text(src.replace(old, new, 1))
          print("Patched base TestCase.timeout() -> 180s")

          mux = pathlib.Path("quic-interop-runner/testcases_quic.py")
          msrc = mux.read_text()
          needle = "        return \"Thousands of files are transferred over a single connection, and server increased stream limits to accomodate client requests.\"\n\n    def get_paths_raw(self):"
          insert = (
              "        return \"Thousands of files are transferred over a single connection, and server increased stream limits to accomodate client requests.\"\n\n"
              "    @staticmethod\n"
              "    def timeout() -> int:\n"
              "        return 480\n\n"
              "    def get_paths_raw(self):"
          )
          if needle not in msrc:
              raise SystemExit("Did not find TestCaseMultiplexing anchor in testcases_quic.py")
          mux.write_text(msrc.replace(needle, insert, 1))
          print("Patched TestCaseMultiplexing.timeout() -> 480s")
          EOF

      # PR interop is split for runtime:
      #   1) zquic↔zquic — full suite (regression signal on every push/PR)
      #   2) zquic↔quinn — P0 cross-impl subset (handshake + transfer in both
      #      directions, plus multiplexing in zquic→quinn only).  Full matrix
      #      runs nightly in .github/workflows/interop-cross-impl.yml.
      - name: Run interop test suite
        run: |
          mkdir -p interop-results
          cd quic-interop-runner
          # run.py exits with nr_failed; for ANY failed case (incl. the known
          # #184 zquic->quinn transfer gap) that is non-zero. Swallow each run's
          # exit here and defer pass/fail to the "Print result summary" gate
          # below: it classifies KNOWN_FAILING (#184) / UNSUPPORTED and fails
          # the job ONLY on a NEW/unexpected failure. (Without this, the known
          # gap reds the job regardless of the summary classification.)
          # rebind-port is flaky on GitHub-hosted runners (NS3 port rebind); keep in nightly cross-impl.
          # connectionmigration before zerortt: long zerortt run leaves NS3 in a bad state.
          INTEROP_TESTS="handshake,transfer,retry,chacha20,keyupdate,v2,ecn,resumption,http3,connectionmigration,zerortt,multiplexing"
          python3 run.py \
            --client zquic \
            --server zquic \
            --test "$INTEROP_TESTS" \
            --log-dir ../interop-results/logs-zquic \
            --json ../interop-results/results-zquic.json \
            --debug || true
          # P0 cross-impl: libp2p-relevant cases.
          # quinn→zquic drops `multiplexing`: known gap (#169 — quinn-driven
          # multiplexing against zquic-as-server is not yet implemented).  The
          # nightly cross-impl matrix still runs it via EXPECTED_UNSUPPORTED.
          CROSS_P0_QUINN_CLIENT="handshake,transfer"
          CROSS_P0_ZQUIC_CLIENT="handshake,transfer,multiplexing"
          python3 run.py \
            --client quinn \
            --server zquic \
            --test "$CROSS_P0_QUINN_CLIENT" \
            --log-dir ../interop-results/logs-cross-quinn-zquic \
            --json ../interop-results/results-cross-quinn-zquic.json \
            --debug || true
          python3 run.py \
            --client zquic \
            --server quinn \
            --test "$CROSS_P0_ZQUIC_CLIENT" \
            --log-dir ../interop-results/logs-cross-zquic-quinn \
            --json ../interop-results/results-cross-zquic-quinn.json \
            --debug || true
        # The "Print result summary" step (if: always()) is the authoritative
        # gate — it exits non-zero on any NEW/unexpected failure. Upload/summary
        # steps below use if: always() so they run regardless.

      # Always upload results so we can track progress across commits.
      - name: Upload interop results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-results-${{ github.sha }}
          path: interop-results/
          retention-days: 30

      # Print a compact pass/fail summary to the job log.
      - name: Print result summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys

          result_files = sorted(pathlib.Path("interop-results").glob("results-*.json"))
          if not result_files:
              print("No results-*.json found — test run may have failed to start.")
              sys.exit(0)

          # Known cross-impl gaps (zquic-as-client vs a quinn server), tracked
          # in zquic#184. Classified separately so a known gap does NOT fail the
          # job; a NEW/unexpected failure still does.
          KNOWN_FAILING = {
              "transfer(cross-zquic-quinn:zquic→quinn)",
              "rebind-port(cross-zquic-quinn:zquic→quinn)",
          }
          passed, failed, unsupported, cross_failed, known_failing = [], [], [], [], []
          for p in result_files:
              data = json.loads(p.read_text())
              suite = p.stem.removeprefix("results-")
              # quic-interop-runner JSON layout:
              #   clients, servers, results (flat per client×server pair)
              clients = data.get("clients", [])
              servers = data.get("servers", [])
              raw = data.get("results", [])
              pair_idx = 0
              for client in clients:
                  for server in servers:
                      if pair_idx >= len(raw):
                          break
                      pair_results = raw[pair_idx]
                      pair_idx += 1
                      label = f"{suite}:{client}→{server}"
                      for test_result in pair_results:
                          if not isinstance(test_result, dict):
                              continue
                          test_name = test_result.get("name") or test_result.get("abbr", "?")
                          result = test_result.get("result")
                          tag = f"{test_name}({label})"
                          if result == "succeeded":
                              passed.append(tag)
                          elif result in (None, "unsupported", "skipped"):
                              unsupported.append(tag)
                          elif tag in KNOWN_FAILING:
                              known_failing.append(tag)
                          elif suite.startswith("cross-"):
                              cross_failed.append(tag)
                          else:
                              failed.append(tag)

          print(f"\n{'='*55}")
          print(f"INTEROP RESULTS")
          print(f"{'='*55}")
          print(f"  PASSED      : {len(passed):2d}  {passed}")
          print(f"  FAILED      : {len(failed):2d}  {failed}")
          if cross_failed:
              print(f"  CROSS FAILED: {len(cross_failed):2d}  {cross_failed}")
          if known_failing:
              print(f"  KNOWN-FAILING: {len(known_failing):2d}  {known_failing}  (tracked: zquic#184)")
          print(f"  UNSUPPORTED : {len(unsupported):2d}  {unsupported}")
          print(f"{'='*55}\n")
          # Authoritative gate: fail ONLY on a new/unexpected failure. Known
          # #184 gaps (known_failing) and unsupported capability gaps do not.
          if failed or cross_failed:
              sys.exit(1)
          EOF
